name: Ejecución Diaria del Pipeline

on:
  schedule:
    # Esto hace que se ejecute todos los días a las 08:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Esto permite que tú le des al botón "Play" manualmente en GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalar librerías necesarias
      run: |
        pip install requests textblob
        # Si tienes más librerías, añádelas aquí

    - name: Ejecutar el Pipeline Maestro
      env:
        # Aquí es donde GitHub leerá tu API Key de forma segura
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python main_pipeline.py

    - name: Guardar base de datos actualizada
      uses: actions/upload-artifact@v4
      with:
        name: base-de-datos-tech
        path: tecnologia.db
